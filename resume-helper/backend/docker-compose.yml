services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://resume:resume@db:5432/resume_helper
      - STORAGE_UPLOAD_DIR=/app/backend/uploads
      - STORAGE_EXPORT_DIR=/app/backend/exports
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
    volumes:
      - ./:/app/backend
    depends_on:
      - db
    command: uvicorn backend.main:app --app-dir /app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/backend

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_AGENT_API_URL=http://backend:8000
      - AGENT_API_URL=http://backend:8000
    volumes:
      - ../frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0 --port 3000

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=resume
      - POSTGRES_PASSWORD=resume
      - POSTGRES_DB=resume_helper
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  postgres_data:
