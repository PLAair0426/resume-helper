previews:
  generation: off

services:
  - type: web
    name: resume-helper-api
    runtime: docker
    rootDir: resume-helper/backend
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: resume-helper-db
          property: connectionString
      - key: STORAGE_UPLOAD_DIR
        value: /tmp/uploads
      - key: STORAGE_EXPORT_DIR
        value: /tmp/exports

databases:
  - name: resume-helper-db
    databaseName: resume_helper
    user: resume_helper
    plan: free
    ipAllowList: []
