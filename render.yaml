previews:
  generation: off

services:
  - type: web
    name: resume-helper-api
    runtime: python
    rootDir: resume-helper
    plan: free
    buildCommand: pip install -r backend/requirements.txt && python -m playwright install chromium
    startCommand: python -m backend.main
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: resume-helper-db
          property: connectionString
      - key: STORAGE_UPLOAD_DIR
        value: /tmp/uploads
      - key: STORAGE_EXPORT_DIR
        value: /tmp/exports

  - type: web
    name: resume-helper-web
    runtime: node
    rootDir: resume-helper/frontend
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: AGENT_API_HOSTPORT
        fromService:
          type: web
          name: resume-helper-api
          property: hostport
      - key: ENABLE_LOCAL_CONFIG_API
        value: "false"
      - key: VITE_ENABLE_LOCAL_CONFIG
        value: "false"

databases:
  - name: resume-helper-db
    databaseName: resume_helper
    user: resume_helper
    plan: free
    ipAllowList: []
